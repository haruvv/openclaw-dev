name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
        continue-on-error: true

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "package.json not found, skipping npm install"
          fi

      - name: Lint
        run: |
          if [ -f package.json ] && npm run lint --if-present 2>/dev/null; then
            echo "Lint passed"
          else
            echo "No lint script found, skipping"
          fi

      - name: Type check
        run: |
          if [ -f package.json ] && npm run typecheck --if-present 2>/dev/null; then
            echo "Type check passed"
          else
            echo "No typecheck script found, skipping"
          fi

      - name: Test
        run: |
          if [ -f package.json ] && npm test --if-present 2>/dev/null; then
            echo "Tests passed"
          else
            echo "No test script found, skipping"
          fi

      - name: Notify Telegram (CI failure)
        if: failure() && github.event_name == 'pull_request'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"❌ CI が失敗しました。\nPR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}\n${{ github.event.pull_request.html_url }}\"
            }"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
