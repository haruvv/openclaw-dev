name: Dev Agent

on:
  issues:
    types: [labeled]

concurrency:
  group: implement
  cancel-in-progress: false

jobs:
  implement:
    if: github.event.label.name == 'ai-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Notify Telegram (start)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TEXT="🔨 実装開始: Issue #${{ github.event.issue.number }}\n${ISSUE_TITLE}\n${RUN_URL}"
          jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$TEXT" \
            '{chat_id: $chat_id, text: $text}' | \
          curl -s --fail --show-error --retry 3 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d @- || true

      - name: Implement with Claude Code
        id: implement
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            以下の Issue を実装し、本番環境にデプロイしてください。

            ## Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            ---

            ## Phase 1: 調査・計画（実装前に必ず実施）

            Issue の内容を読んで**必要な調査を判断し**、実施してから計画を立てる。
            調査は以下の3種類。Issue の性質に応じて必要なものだけ行う。

            ### 1-A. コードベース調査（ほぼ毎回必要）
            - `apps/` を一覧し、各アプリの `package.json` の name・description を読んで対象を特定する
            - 対象アプリが一意に特定できない場合は、Issue に候補を列挙して確認を求め、実装は行わずに終了すること。その際「返答後に ai-dev ラベルを外して再付与すれば再実行します」と伝えること
            - Issue に関連するファイルを特定して読む
            - 既存のコードパターン・スタイル・依存関係を確認する

            ### 1-B. 技術調査（新しい技術・ライブラリ・API を使う場合）
            WebFetch / WebSearch を使って調査する。
            - 使用するライブラリの最新ドキュメント・バージョン
            - API 仕様・認証方法・レート制限
            - 既知の問題・ベストプラクティス・移行ガイド

            ### 1-C. その他調査（Issue に明示的な指示がある場合）
            WebSearch を使って調査する。
            - 競合・類似サービスの実装方法
            - 業界標準・UX パターン
            - ユーザーニーズ・市場トレンド

            ### 計画投稿
            調査完了後、以下の形式で GitHub Issue にコメントを投稿する：

            ```
            ## 実装計画

            ### 調査結果
            - コードベース: （関連ファイル・既存パターン）
            - 技術調査: （実施した場合のみ）
            - その他調査: （実施した場合のみ）

            ### 実装方針
            （何をどう変更するか）

            ### 変更ファイル
            - （ファイル名）: （変更内容）

            ### 検証方法
            （テスト・動作確認の方法）
            ```

            ## Phase 2: 実装

            計画に従って実装する。

            **コミット・プッシュ**
            - PR は作らない
            - 実装後は `git push origin main` で直接プッシュする

            **検証ループ（エラーがあれば修正してから進む）**
            1. `npm run typecheck` または `npx tsc --noEmit`
            2. `npm run lint`（スクリプトがあれば）
            3. `npm test`（スクリプトがあれば）

            **デプロイ**
            - wrangler.jsonc または wrangler.json があれば `npx wrangler deploy` を実行する
            - Issue 本文に「dev 環境」の指示があれば `npx wrangler deploy --env dev`
            - デプロイ後は成果物の URL を確認する

            **禁止**
            - リポジトリ・ブランチの削除
            - データストアの全削除
            - `git push --force`

            CLAUDE.md の指針に従うこと。
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Extract deploy URL
        id: deploy_url
        if: success()
        run: |
          URL=$(grep -oP 'https://[^\s]+\.workers\.dev' "$GITHUB_STEP_SUMMARY" 2>/dev/null | tail -1 || true)
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Notify Telegram (success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          DEPLOY_URL: ${{ steps.deploy_url.outputs.url }}
        run: |
          TEXT="✅ Issue #${{ github.event.issue.number }} 完了\n${ISSUE_TITLE}\n${ISSUE_URL}"
          [ -n "$DEPLOY_URL" ] && TEXT="${TEXT}\n🚀 ${DEPLOY_URL}"
          jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$TEXT" \
            '{chat_id: $chat_id, text: $text}' | \
          curl -s --fail --show-error --retry 3 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d @- || true

      - name: Notify Telegram (failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TEXT="❌ Issue #${{ github.event.issue.number }} 失敗\n${ISSUE_TITLE}\n${RUN_URL}"
          jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$TEXT" \
            '{chat_id: $chat_id, text: $text}' | \
          curl -s --fail --show-error --retry 3 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d @- || true
