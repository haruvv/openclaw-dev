name: Dev Agent

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'ai-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Implement with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            以下の Issue を実装し、本番環境にデプロイしてください。

            ## Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            ## 必須ルール

            **コミット・プッシュ**
            - PR は作らない
            - 実装後は `git push origin main` で直接プッシュする

            **検証ループ（エラーがあれば修正してから進む）**
            1. `npm run typecheck` または `npx tsc --noEmit`
            2. `npm run lint`（スクリプトがあれば）
            3. `npm test`（スクリプトがあれば）

            **デプロイ**
            - wrangler.jsonc または wrangler.json があれば `npx wrangler deploy` を実行する
            - Issue 本文に「dev 環境」の指示があれば `npx wrangler deploy --env dev`
            - デプロイ後は成果物の URL を確認する

            **禁止**
            - リポジトリ・ブランチの削除
            - データストアの全削除
            - `git push --force`

            CLAUDE.md の指針に従うこと。
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify Telegram (success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"✅ Issue #${{ github.event.issue.number }} 完了\n${{ github.event.issue.title }}\nhttps://github.com/${{ github.repository }}/issues/${{ github.event.issue.number }}\"
            }"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"❌ Issue #${{ github.event.issue.number }} 失敗\n${{ github.event.issue.title }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
