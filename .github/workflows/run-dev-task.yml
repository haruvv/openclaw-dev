name: Run Dev Task

on:
  repository_dispatch:
    types: [run-dev-task]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      TASK_ID: ${{ github.event.client_payload.task_id }}
      CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
      CALLBACK_TOKEN: ${{ github.event.client_payload.callback_token }}
      DEV_TEAM_WORKERS_URL: ${{ secrets.DEV_TEAM_WORKERS_URL }}
      DEV_TEAM_WORKERS_TOKEN: ${{ secrets.DEV_TEAM_WORKERS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Update task status to running
        run: |
          curl -s -X PATCH "${DEV_TEAM_WORKERS_URL}/internal/tasks/${TASK_ID}" \
            -H "Authorization: Bearer ${DEV_TEAM_WORKERS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"status":"running"}'

      - name: Implement with Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            以下の仕様を実装してください。

            ## 仕様
            ${{ github.event.client_payload.spec }}

            ## 方針
            - 実装が完了したら Cloudflare Workers または Pages にデプロイする
            - デプロイ後の URL を artifact_url として出力する（echo "ARTIFACT_URL=..." >> $GITHUB_ENV）
            - 成果物の概要を summary として出力する（echo "SUMMARY=..." >> $GITHUB_ENV）
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update task status to done and notify
        if: success()
        run: |
          SUMMARY="${SUMMARY:-実装完了}"
          ARTIFACT_URL="${ARTIFACT_URL:-}"

          # KV を更新
          curl -s -X PATCH "${DEV_TEAM_WORKERS_URL}/internal/tasks/${TASK_ID}" \
            -H "Authorization: Bearer ${DEV_TEAM_WORKERS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"done\",\"summary\":\"${SUMMARY}\",\"artifact_url\":\"${ARTIFACT_URL}\"}"

          # OpenClaw に完了通知
          MESSAGE="タスク完了: ${TASK_ID}"
          if [ -n "$ARTIFACT_URL" ]; then
            MESSAGE="${MESSAGE}\n成果物: ${ARTIFACT_URL}"
          fi
          MESSAGE="${MESSAGE}\n概要: ${SUMMARY}"

          curl -s -X POST "${CALLBACK_URL}/hooks/wake" \
            -H "Authorization: Bearer ${CALLBACK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"${MESSAGE}\",\"mode\":\"now\"}"

      - name: Update task status to failed and notify
        if: failure()
        run: |
          ERROR_MSG="GitHub Actions run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # KV を更新
          curl -s -X PATCH "${DEV_TEAM_WORKERS_URL}/internal/tasks/${TASK_ID}" \
            -H "Authorization: Bearer ${DEV_TEAM_WORKERS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"error\":\"${ERROR_MSG}\"}"

          # OpenClaw に失敗通知
          curl -s -X POST "${CALLBACK_URL}/hooks/wake" \
            -H "Authorization: Bearer ${CALLBACK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"タスク失敗: ${TASK_ID}\nエラー: ${ERROR_MSG}\",\"mode\":\"now\"}"
